<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>尘柒的 MC：导演剪辑版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: #000000;
        font-size: clamp(22px, 3vw, 36px);
        font-weight: 700;
        letter-spacing: 0.12em;
        transition:
          opacity 0.35s ease,
          visibility 0.35s ease;
      }

      .loading-screen.is-hidden {
        visibility: hidden;
        opacity: 0;
      }
    </style>
    <link rel="stylesheet" href="style.css?v=20260720-1" />
  </head>
  <body>
    <div class="loading-screen" aria-live="polite">加载中</div>
    <main>
      <section class="page hero" aria-label="开场图片">
        <img src="img/2026-01-26_00.03.30.png" alt="Minecraft scene" class="hero-image" />
        <div class="hero-title" aria-label="尘柒的 MC 导演剪辑版">
          <p class="hero-kicker">TENQUI'S MC</p>
          <h1>
            <span class="hero-title-small">尘柒的 MC</span>
            <span class="hero-title-large">导演剪辑版</span>
          </h1>
          <p class="hero-meta">DIRECTOR'S CUT · MINECRAFT 1.21.6</p>
        </div>
        <p class="hero-subtitle">以原版为核心的轻量生存整合包</p>
        <p class="scroll-hint">向下滚动</p>
      </section>

      <section class="page text-page" aria-label="文字页">
        <div class="text-card">
          <p class="eyebrow">Director’s Cut</p>
          <h2>一个被重新剪辑的方块世界</h2>
          <p>
            这里先放一段占位文字。你可以把它换成故事简介、地图说明、角色介绍，
            或者任何想让玩家在进入世界前看到的内容。
          </p>
          <p>
            鼠标滚轮每次只翻一整页，页面切换保持完整、直接，不会停在半屏的位置。
          </p>
        </div>
      </section>
    </main>

    <script src="index.js?v=20260720-2"></script>
  </body>
</html>
